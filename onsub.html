<!DOCTYPE html>
<html>
    <body>
        <form onsubmit="checkLogin(event)">
            <input type="text"id="user">
            <button type="submit">Login</button>
        </form>
        <script>
            function checkLogin(e)
            {
                e.preventDefault()
                if(user.value==="")
            {
                alert("Username required");
            }
            }
        </script>
    </body>
</html>
